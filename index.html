<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulário de Aporte</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  margin: 0;
  background: linear-gradient(135deg, #1e293b, #0f172a);
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: 20px;
  background: #ffffff;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

/* CENTRALIZA NO DESKTOP */
@media (min-width: 768px) {
  .container {
    margin: 40px auto;
    padding: 30px;
  }
}

/* LOGO */
.logo {
  text-align: center;
  margin-bottom: 15px;
}

.logo img {
  max-width: 180px;
}

/* TITULO */
h1 {
  text-align: center;
  margin-bottom: 20px;
  font-size: 22px;
}

/* SEÇÕES */
h2 {
  margin-top: 25px;
  font-size: 18px;
  border-left: 4px solid #f97316;
  padding-left: 8px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 15px;
}

/* 2 COLUNAS NO DESKTOP */
@media (min-width: 768px) {
  .grid {
    grid-template-columns: 1fr 1fr;
  }
}

/* CAMPOS */
.field {
  display: flex;
  flex-direction: column;
}

label {
  font-size: 13px;
  font-weight: 600;
}

/* INPUTS */
input, select, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  border-radius: 10px;
  border: 1px solid #cbd5e1;
  font-size: 16px;
}

/* FOCO */
input:focus, select:focus, textarea:focus {
  border-color: #f97316;
  box-shadow: 0 0 0 2px rgba(249,115,22,0.2);
  outline: none;
}

textarea {
  min-height: 90px;
}

/* RADIO */
.radio-group {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 5px;
}

/* BOTÃO */
button {
  margin-top: 25px;
  padding: 16px;
  width: 100%;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #f97316, #ea580c);
  color: white;
  font-size: 16px;
  font-weight: bold;
}

/* BOTÃO FIXO MOBILE */
@media (max-width: 600px) {
  button {
    position: sticky;
    bottom: 10px;
  }
}

.hidden {
  display: none;
}
</style>

</head>
<body>

<div class="container">

  <div class="logo">
    <img src="https://www.funssest.com.br/wp-content/uploads/2022/12/FUNSSEST_Logomarca-logo-2048x873.png">
  </div>

  <h1 id="titulo"></h1>

  <form id="form"></form>

</div>

<script>
async function init() {
  const res = await fetch('form.json');
  const data = await res.json();

  document.getElementById('titulo').innerText = data.titulo;
  const form = document.getElementById('form');

  data.secoes.forEach(secao => {
    const h2 = document.createElement('h2');
    h2.innerText = secao.titulo;
    form.appendChild(h2);

    const grid = document.createElement('div');
    grid.className = 'grid';

    secao.campos.forEach(campo => {
      const wrapper = document.createElement('div');
      wrapper.className = 'field';
      wrapper.id = "wrap_" + campo.id;

      const label = document.createElement('label');
      label.innerText = campo.label;

      let input;

      if (campo.tipo === 'select') {
        input = document.createElement('select');
        campo.opcoes.forEach(op => {
          const option = document.createElement('option');
          option.value = op;
          option.text = op;
          input.appendChild(option);
        });
      } else if (campo.tipo === 'textarea') {
        input = document.createElement('textarea');
      } else if (campo.tipo === 'radio') {
        input = document.createElement('div');
        input.className = "radio-group";

        campo.opcoes.forEach(op => {
          const lbl = document.createElement('label');
          const radio = document.createElement('input');

          radio.type = 'radio';
          radio.name = campo.id;
          radio.value = op;
          radio.onchange = handleConditional;

          lbl.appendChild(radio);
          lbl.append(" " + op);

          input.appendChild(lbl);
        });
      } else {
        input = document.createElement('input');
        input.type = campo.tipo;
      }

      if (campo.tipo !== 'radio') {
        input.name = campo.id;
        input.onchange = handleConditional;
      }

      if (campo.required) input.required = true;

      label.appendChild(input);
      wrapper.appendChild(label);
      grid.appendChild(wrapper);
    });

    form.appendChild(grid);
  });

  const btn = document.createElement('button');
  btn.innerText = "Enviar Formulário";
  form.appendChild(btn);

  form.onsubmit = e => {
    e.preventDefault();

    const formData = new FormData(form);
    const obj = {};

    formData.forEach((v, k) => obj[k] = v);

    console.log(obj);
    alert("Enviado com sucesso 🚀");
  };
}

function handleConditional() {
  const coaf = document.querySelector('input[name="coaf"]:checked')?.value;

  document.getElementById('wrap_justificativa')?.classList.toggle('hidden', coaf !== 'NÃO');
  document.getElementById('wrap_data_coaf')?.classList.toggle('hidden', coaf !== 'SIM');
  document.getElementById('wrap_responsavel')?.classList.toggle('hidden', coaf !== 'SIM');
}

init();
</script>

</body>
</html>
